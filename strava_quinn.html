<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
        integrity="sha256-kLaT2GOSpHechhsozzB+flnD+zUyjE2LlfWPgU04xyI=" crossorigin="" />

    <style>
        #map {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            display: block;
        }

        #analytics {
            margin-top: 5vh;
            height: 100vh;
            width: 100vw;
            display: none;
            overflow-y: scroll; /* Allow scrolling for multiple charts */
            padding: 20px;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh; /* Full viewport height */
        }

        h1 {
            position: absolute;
            top: 0; /* Keep the header at the top */
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000; /* Ensure it stays above the map and chart */
            color: #000; /* Adjust the text color if needed */
            font-size: 64px; /* Larger font size */
            font-weight: 900; /* Bolder font weight */
            font-family: 'Arial Black', sans-serif; /* Blockier font */
            text-transform: uppercase; /* Optional: Make text all uppercase */
            letter-spacing: 2px; /* Optional: Add letter spacing */
            margin-top: 20px; /* Add margin to create space below */
        }

        /* Responsive design to reduce font size on smaller screens */
        @media (max-width: 1310px) {
            h1 {
                font-size: 48px; /* Reduce font size for smaller screens */
                margin-top: 20px; /* Adjust the margin accordingly */
            }
        }

        @media (max-width: 1000px) {
            h1 {
                font-size: 36px; /* Reduce font size for smaller screens */
                margin-top: 20px; /* Adjust the margin accordingly */
            }
        }

        @media (max-width: 775px) {
            h1 {
                font-size: 24px; /* Reduce font size for smaller screens */
                margin-top: 20px; /* Adjust the margin accordingly */
            }
        }

        #toggle-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background-color: white;
            padding: 10px 20px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        .chart-container {
            width: 100%;
            height: 600px;
            margin-bottom: 40px; /* Space between charts */
        }

        .chart-title {
            font-size: 24px;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>

</head>

<body>
    <h1 id="header-title">Quinn's Map</h1>
    <button id="toggle-btn">Show Analytics</button>
    <div id="map"></div>

    <div id="analytics">
        <div class="chart-container">
            <h2 class="chart-title">Workout Miles by Day</h2>
            <div id="workoutChart"></div>
        </div>
        <div class="chart-container">
            <h2 class="chart-title">Chart 2</h2>
            <div id="chart2"></div>
        </div>
        <div class="chart-container">
            <h2 class="chart-title">Chart 3</h2>
            <div id="chart3"></div>
        </div>
        <div class="chart-container">
            <h2 class="chart-title">Chart 4</h2>
            <div id="chart4"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
        integrity="sha256-WBkoXOwTeyKclOHuWtc+i2uENFpDZ9YPdf5Hf+D7ewM=" crossorigin=""></script>
    <script src="https://cdn.plot.ly/plotly-2.17.1.min.js"></script>
    <script src="js/strava_api.js"></script>
    <script src="js/Polyline.encoded.js"></script>

    <script>
        document.getElementById("toggle-btn").addEventListener("click", function () {
            const mapDiv = document.getElementById("map");
            const analyticsDiv = document.getElementById("analytics");
            const headerTitle = document.getElementById("header-title");

            if (mapDiv.style.display === "none") {
                mapDiv.style.display = "block";
                analyticsDiv.style.display = "none";
                this.textContent = "Show Analytics";
                headerTitle.textContent = "Quinn's Map";
            } else {
                mapDiv.style.display = "none";
                analyticsDiv.style.display = "block";
                this.textContent = "Show Map";
                headerTitle.textContent = "Quinn's Analytics";
                drawChart(); // Call the function to draw the charts when analytics are shown
            }
        });

        // Example function to draw the charts, modify as needed for your data
        function drawChart() {
            const dates = Object.keys(workoutData);
            const runningMiles = dates.map(date => workoutData[date].running || 0); // Ensure value is 0 if undefined
            const cyclingMiles = dates.map(date => workoutData[date].cycling || 0);
            const swimmingMiles = dates.map(date => workoutData[date].swimming || 0);
            const walkMiles = dates.map(date => workoutData[date].walk || 0);
            const snowMiles = dates.map(date => workoutData[date].snow_sport || 0);
            const otherMiles = dates.map(date => workoutData[date].other || 0);

            // Calculate the total miles for each date and ensure it's formatted correctly
            const totalMiles = dates.map(date => (
                (workoutData[date].running || 0) +
                (workoutData[date].cycling || 0) +
                (workoutData[date].swimming || 0) +
                (workoutData[date].walk || 0) +
                (workoutData[date].snow_sport || 0) +
                (workoutData[date].other || 0)
            )); 

            const traceRunning = { x: dates, y: runningMiles, name: 'Running', type: 'bar', marker: { color: 'red' } };
            const traceCycling = { x: dates, y: cyclingMiles, name: 'Cycling', type: 'bar', marker: { color: 'darkorange' } };
            const traceSwimming = { x: dates, y: swimmingMiles, name: 'Swimming', type: 'bar', marker: { color: 'blue' } };
            const traceWalking = { x: dates, y: walkMiles, name: 'Walking', type: 'bar', marker: { color: 'black' } };
            const traceSnow = { x: dates, y: snowMiles, name: 'Snow Sports', type: 'bar', marker: { color: '#5f99cf' } };
            const traceOther = { x: dates, y: otherMiles, name: 'Other', type: 'bar', marker: { color: 'purple' } };

            // Get the current date and calculate the start date for 6 months ago
            const currentDate = new Date();
            const sixMonthsAgo = new Date();
            sixMonthsAgo.setMonth(currentDate.getMonth() - 1); // Subtract 6 months from the current date

            const layout = {
                barmode: 'stack',
                title: 'Workout Miles by Day',
                xaxis: {
                    title: 'Date',
                    range: [sixMonthsAgo.toISOString().split('T')[0], currentDate.toISOString().split('T')[0]], // Default view: last 6 months
                    rangeslider: { visible: true }, // Enable scrolling beyond the default range
                    type: 'date', // Treat x-axis as date
                    fixedrange: false, // Allow zooming and panning
                    tickmode: 'linear', // Force the ticks to be evenly spaced
                    tickformat: '%b %d, %Y', // Format the date (e.g., Aug 15, 2024)
                    dtick: 86400000 // Force a tick every day (86400000 ms = 1 day)
                },
                yaxis: {
                    title: 'Miles',
                    range: [0, Math.max(...totalMiles) + 10] // Dynamically set the Y-axis range to 10 miles above the max miles
                },
                bargap: 0.1, // Adjust space between bars
                bargroupgap: 0.1, // Adjust group space for stacked bars
                annotations: dates.map((date, index) => ({
                    x: date,
                    y: totalMiles[index], 
                    text: `${parseFloat(totalMiles[index]).toFixed(2)} mi`, 
                    showarrow: false,
                    font: { size: 12 },
                    xanchor: 'center',
                    yanchor: 'center',
                    yshift: 10
                    //yanchor: totalMiles[index] < 10 ? 'top' : 'bottom' // Place text inside the bar if the total is small
                    //,yshift: totalMiles[index] < 10 ? -10 : 5 // Add a slight shift based on the size of the bar
                }))
            };

            Plotly.newPlot('workoutChart', [traceRunning, traceCycling, traceSwimming, traceWalking, traceSnow, traceOther], layout);

            // Additional placeholder charts, repeat similar structure
            /*
            Plotly.newPlot('chart2', [{
                x: ['2024-10-10', '2024-10-11', '2024-10-12'],
                y: [3, 7, 5],
                type: 'bar'
            }]);

            Plotly.newPlot('chart3', [{
                labels: ['Running', 'Cycling', 'Swimming'],
                values: [30, 40, 10],
                type: 'pie'
            }]);

            Plotly.newPlot('chart4', [{
                x: [1, 2, 3],
                y: [2, 3, 4],
                type: 'scatter'
            }]);
            */
        }
    </script>
</body>

</html>
