<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
        integrity="sha256-kLaT2GOSpHechhsozzB+flnD+zUyjE2LlfWPgU04xyI=" crossorigin="" />

  <style>
    /* Map & analytics layout */
    #map { height:100vh; width:100vw; margin:0; padding:0; display:block; }
    #analytics{ margin-top:5vh; height:100vh; width:100vw; display:none; overflow-y:scroll; padding:20px; box-sizing:border-box; }
    body{ margin:0; font-family:'Aptos Narrow', sans-serif; padding:0; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; height:100vh; background:#000; }

    /* Header */
    h1{
      position:fixed;           /* stick to viewport top */
      top:0; left:50%; transform:translateX(-50%);
      z-index:1200;
      padding:8px 10px;
      color:#fff;
      font-size:64px; font-weight:600;
      font-family:'Aptos Narrow', sans-serif;
      letter-spacing:1px;
      border-radius:16px;
      background:rgba(255,255,255,0.18);          /* glassy layer */
      backdrop-filter:blur(12px) saturate(160%);
      -webkit-backdrop-filter:blur(12px) saturate(160%);
      border:1px solid rgba(255,255,255,0.4);
      text-shadow:0 2px 6px rgba(0,0,0,0.35);
      pointer-events:none;       /* clicks pass through */
    }
    
    @media(max-width:1310px){h1{font-size:48px;}}
    @media(max-width:1000px){h1{font-size:36px;}}
    @media(max-width:775px){h1{font-size:24px;}}

    /* Toggle button */
    #toggle-btn{ position:absolute; top:10px; right:10px; z-index:1000; background:#fff; padding:10px 20px; border:none; font-size:16px; cursor:pointer; }

    .chart-container{ width:100%; height:600px; margin-bottom:40px; }
    .chart-title{ font-size:24px; text-align:center; margin-bottom:10px; }

    /* ── Overlays ─────────────────────────────────────────────── */
    /* Black preloader (fades out over 0.5s) */
    #preload{ position:fixed; inset:0; background:#000; z-index:2000; opacity:1; pointer-events:none; }
    #preload.fade{ animation:preFade 1s forwards ease; }
    @keyframes preFade{ to{ opacity:0; visibility:hidden; } }

    /* Glass-morph splash */
    #splash{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.15); backdrop-filter:blur(14px)saturate(160%); -webkit-backdrop-filter:blur(14px)saturate(160%); z-index:1500; pointer-events:none; opacity:1; }
    #splash.fade-out{ animation:splashFade 2s forwards ease; }
    @keyframes splashFade{ to{ opacity:0; visibility:hidden; } }
    .splash-text{ font-family:'Aptos Narrow', sans-serif; font-size:clamp(32px,8vw,96px); font-weight:700; color:#fff; text-align:center; text-shadow:0 4px 12px rgba(0,0,0,0.3); padding:0 6vw; line-height:1.2; }
  </style>

</head>

<body id="body">
    <!-- 0) Black preload overlay -->
    <div id="preload"></div>
    <!-- 1) Glass splash overlay -->
    <div id="splash"><div class="splash-text" id="splash-text"></div></div>

    <h1 id="header-title">Michael's Map</h1>
    <button id="toggle-btn">Show Analytics</button>
    <div id="map"></div>

    <div id="analytics">
        <div class="chart-container">
            <br><br>
            <div id="activity-summary" style="font-size:18px; line-height:1.6;"></div>
        </div>
        <hr>
        <div class="chart-container">
            <div id="workoutChart"></div>
        </div>
        <hr>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
        integrity="sha256-WBkoXOwTeyKclOHuWtc+i2uENFpDZ9YPdf5Hf+D7ewM=" crossorigin=""></script>
    <script src="https://cdn.plot.ly/plotly-2.17.1.min.js"></script>
    <script src="js/strava_api_michael.js"></script>
    <script src="js/Polyline.encoded.js"></script>

    <script>
        /* ─── Splash + preload timing ───────────────────────────── */
        const preload   = document.getElementById('preload');
        const splash    = document.getElementById('splash');
        const splashTxt = document.getElementById('splash-text');

        function ordinal(n){const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
        const d = new Date();
        splashTxt.textContent = `${d.toLocaleDateString(undefined,{weekday:'long'})}, ${d.toLocaleDateString(undefined,{month:'long'})} ${ordinal(d.getDate())} ${d.getFullYear()}`;

        window.addEventListener('load', ()=>{
        // 1) fade black overlay over 0.5s
        preload.classList.add('fade');
        // 2) wait 0.5s, keep glass visible 1.5s, then fade splash over 1.2s
        setTimeout(()=>{
            setTimeout(()=> splash.classList.add('fade-out'), 2000); // stays for 1.5s
        }, 500);
        });

        // ── Toggle Map / Analytics button ────────────────────────────
        document.getElementById('toggle-btn').addEventListener('click', function () {
            const mapDiv       = document.getElementById('map');
            const analyticsDiv = document.getElementById('analytics');
            const headerTitle  = document.getElementById('header-title');
            const body         = document.getElementById('body');

            body.style.background = '#ffffff';

            if (mapDiv.style.display === 'none') {
                mapDiv.style.display       = 'block';
                analyticsDiv.style.display = 'none';
                this.textContent           = 'Show Analytics';
                headerTitle.style.display  = "block";
            } else {
                mapDiv.style.display       = 'none';
                analyticsDiv.style.display = 'block';
                this.textContent           = 'Show Map';
                headerTitle.style.display  = "none";
                drawChart();
                drawSummary();
            }
        });
        /*document.getElementById("toggle-btn").addEventListener("click", function () {
            const mapDiv = document.getElementById("map");
            const analyticsDiv = document.getElementById("analytics");
            const headerTitle = document.getElementById("header-title");

            if (mapDiv.style.display === "none") {
                mapDiv.style.display = "block";
                analyticsDiv.style.display = "none";
                this.textContent = "Show Analytics";
                headerTitle.textContent = "Connor's Map";
            } else {
                mapDiv.style.display = "none";
                analyticsDiv.style.display = "block";
                this.textContent = "Show Map";
                headerTitle.textContent = "Connor's Analytics";
                drawChart(); // Call the function to draw the charts when analytics are shown
                drawSummary(); // Call the function to draw the SUMMARY when analytics are shown
            }
        });*/

        

        // Example function to draw the charts, modify as needed for your data
        function drawChart() {
            const dates = Object.keys(workoutData);
            const runningMiles = dates.map(date => workoutData[date].running || 0); // Ensure value is 0 if undefined
            const cyclingMiles = dates.map(date => workoutData[date].cycling || 0);
            const swimmingMiles = dates.map(date => workoutData[date].swimming || 0);
            const walkMiles = dates.map(date => workoutData[date].walk || 0);
            const snowMiles = dates.map(date => workoutData[date].snow_sport || 0);
            const otherMiles = dates.map(date => workoutData[date].other || 0);

            // Calculate the total miles for each date and ensure it's formatted correctly
            const totalMiles = dates.map(date => (
                (workoutData[date].running || 0) +
                (workoutData[date].cycling || 0) +
                (workoutData[date].swimming || 0) +
                (workoutData[date].walk || 0) +
                (workoutData[date].snow_sport || 0) +
                (workoutData[date].other || 0)
            )); 

            const traceRunning = { x: dates, y: runningMiles, name: 'Running', type: 'bar', marker: { color: '#d62728' } };
            const traceCycling = { x: dates, y: cyclingMiles, name: 'Cycling', type: 'bar', marker: { color: '#F28E2B' } };
            const traceSwimming = { x: dates, y: swimmingMiles, name: 'Swimming', type: 'bar', marker: { color: '#1f77b4' } };
            const traceWalking = { x: dates, y: walkMiles, name: 'Walking', type: 'bar', marker: { color: 'black' } };
            const traceSnow = { x: dates, y: snowMiles, name: 'Snow Sports', type: 'bar', marker: { color: '#5f99cf' } };
            const traceOther = { x: dates, y: otherMiles, name: 'Other', type: 'bar', marker: { color: 'purple' } };

            // Get the current date and calculate the start date for 3 months ago
            const currentDate = new Date();
            const sixMonthsAgo = new Date();
            sixMonthsAgo.setMonth(currentDate.getMonth() - 1); // Subtract 1 months from the current date

            const layout = {
                barmode: 'stack',
                title: 'Workout Miles by Day',
                dragmode: 'pan',
                xaxis: {
                    title: 'Date',
                    range: [sixMonthsAgo.toISOString().split('T')[0], currentDate.toISOString().split('T')[0]], // Default view: last 3 months
                    rangeslider: { visible: false }, // Enable scrolling beyond the default range
                    type: 'date', // Treat x-axis as date
                    fixedrange: false, // Allow zooming and panning
                    tickmode: 'linear', // Force the ticks to be evenly spaced
                    tickformat: '%b %d, %Y', // Format the date (e.g., Aug 15, 2024)
                    dtick: 86400000 // Force a tick every day (86400000 ms = 1 day)
                },
                yaxis: {
                    title: 'Miles',
                    range: [0, Math.max(...totalMiles) + 10] // Dynamically set the Y-axis range to 10 miles above the max miles
                },
                bargap: 0.1, // Adjust space between bars
                bargroupgap: 0.1, // Adjust group space for stacked bars
                annotations: dates.map((date, index) => ({
                    x: date,
                    y: totalMiles[index], 
                    text: `${parseFloat(totalMiles[index]).toFixed(2)} mi`, 
                    showarrow: false,
                    font: { size: 12 },
                    xanchor: 'center',
                    yanchor: 'center',
                    yshift: 10
                    //yanchor: totalMiles[index] < 10 ? 'top' : 'bottom' // Place text inside the bar if the total is small
                    //,yshift: totalMiles[index] < 10 ? -10 : 5 // Add a slight shift based on the size of the bar
                }))
            };

            Plotly.newPlot('workoutChart', [traceRunning, traceCycling, traceSwimming, traceWalking, traceSnow, traceOther], layout);
        }
    </script>
</body>

</html>
