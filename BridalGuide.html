<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover"
    >

    <title>Bridal Guide</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #525659;
        }

        .pdf-container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
        }

        .pdf-viewer {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            background: #ffffff;
        }
    </style>
</head>

<body>
    <main class="pdf-container">
        <object
            class="pdf-viewer"
            data="./data/Bridal_Guide.pdf"
            type="application/pdf"
            aria-label="Bridal Guide PDF"
        >
            <p>
                Your browser could not display the PDF.
                <a href="./data/Bridal_Guide.pdf" target="_blank" rel="noopener">
                    Open the Bridal Guide
                </a>
            </p>
        </object>
    </main>
</body>
</html>
