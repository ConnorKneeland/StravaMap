<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
        integrity="sha256-kLaT2GOSpHechhsozzB+flnD+zUyjE2LlfWPgU04xyI=" crossorigin="" />
    <style>
        #map { height:100vh; width:100vw; margin:0; padding:0; display:block; }
        #analytics{ margin-top:5vh; height:100vh; width:100vw; display:none; overflow-y:scroll; padding:20px; box-sizing:border-box; background:#fff; }
        body{ margin:0; font-family:'Aptos Narrow', sans-serif; padding:0; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; height:100vh; background:#000; }
        h1{ position:fixed; top:0; left:50%; transform:translateX(-50%); z-index:1200; padding:8px 10px; color:#fff; font-size:64px; font-weight:600; font-family:'Aptos Narrow', sans-serif; letter-spacing:1px; border-radius:16px; background:rgba(255,255,255,0.18); backdrop-filter:blur(12px) saturate(160%); -webkit-backdrop-filter:blur(12px) saturate(160%); border:1px solid rgba(255,255,255,0.4); text-shadow:0 2px 6px rgba(0,0,0,0.35); pointer-events:none; transition:opacity 1.5s ease; }
        h1.faded { opacity:0; }
        @media(max-width:1310px){h1{font-size:48px;}}
        @media(max-width:1000px){h1{font-size:36px;}}
        @media(max-width:775px){h1{font-size:24px;}}
        @media(max-width:600px){h1{display:none;}}
        #toggle-btn{ position:absolute; top:10px; right:10px; z-index:1300; background:#fff; padding:10px 20px; border:none; font-size:16px; cursor:pointer; }
        .chart-container{ width:100%; height:600px; margin-bottom:40px; }
        #preload{ position:fixed; inset:0; background:#000; z-index:2000; opacity:1; pointer-events:none; }
        #preload.fade{ animation:preFade 1s forwards ease; }
        @keyframes preFade{ to{ opacity:0; visibility:hidden; } }
        #splash{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.15); backdrop-filter:blur(14px) saturate(160%); -webkit-backdrop-filter:blur(14px) saturate(160%); z-index:1500; pointer-events:none; opacity:1; }
        #splash.fade-out{ animation:splashFade 2s forwards ease; }
        @keyframes splashFade{ to{ opacity:0; visibility:hidden; } }
        .splash-text{ font-family:'Aptos Narrow', sans-serif; font-size:clamp(32px,8vw,96px); font-weight:700; color:#fff; text-align:center; text-shadow:0 4px 12px rgba(0,0,0,0.3); padding:0 6vw; line-height:1.2; }
        .glass-panel,.glass-link{ background:rgba(255,255,255,0.18); backdrop-filter:blur(12px) saturate(160%); -webkit-backdrop-filter:blur(12px) saturate(160%); border:1px solid rgba(255,255,255,0.4); border-radius:16px; color:#fff; text-shadow:0 2px 6px rgba(0,0,0,0.35); font-family:'Aptos Narrow', sans-serif; }
        #filter-panel{ position:fixed; top:12px; left:12px; z-index:1250; width:min(340px, calc(100vw - 24px)); padding:12px; box-sizing:border-box; }
        #filter-toggle{ display:flex; align-items:center; justify-content:space-between; width:100%; background:transparent; border:none; color:#fff; font:inherit; cursor:pointer; padding:0; }
        #filter-body{ margin-top:12px; display:grid; gap:12px; }
        .filter-row{ display:grid; gap:8px; }
        .filter-row label,.filter-meta{ font-size:16px; }
        .date-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .filter-input,.type-pill{ background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.3); color:#fff; border-radius:10px; font:inherit; }
        .filter-input{ padding:8px 10px; }
        .filter-input::-webkit-calendar-picker-indicator{ filter:invert(1); }
        #type-pills{ display:flex; flex-wrap:wrap; gap:8px; }
        .type-pill{ padding:6px 12px; cursor:pointer; }
        .type-pill.inactive{ opacity:0.3; }
        .type-pill.active{ border-color:rgba(255,255,255,0.75); }
        #nav-links{ position:fixed; top:12px; right:170px; z-index:1250; display:flex; gap:10px; }
        .glass-link{ display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; text-decoration:none; }
        @media(max-width:600px){ #nav-links{ display:none; } #filter-panel{ width:calc(100vw - 24px); } }
    </style>
</head>

<body id="body">
    <div id="preload"></div>
    <div id="splash"><div class="splash-text" id="splash-text"></div></div>
    <h1 id="header-title">Strava Map</h1>
    <div id="filter-panel" class="glass-panel">
        <button id="filter-toggle" type="button"><span id="filter-toggle-label">▼ Filters</span><span id="filter-toggle-count">0</span></button>
        <div id="filter-body">
            <div class="filter-row">
                <div class="date-grid">
                    <label>From<input id="date-from" class="filter-input" type="date" /></label>
                    <label>To<input id="date-to" class="filter-input" type="date" /></label>
                </div>
            </div>
            <div class="filter-row">
                <div id="type-pills"></div>
            </div>
            <div class="filter-meta" id="activity-count-label">Showing 0 activities</div>
        </div>
    </div>
    <div id="nav-links">
        <a class="glass-link" href="strava_compare.html">Comparison</a>
        <a class="glass-link" href="strava_competitions.html">Competitions</a>
    </div>
    <button id="toggle-btn">Show Analytics</button>
    <div id="map"></div>
    <div id="analytics">
        <div class="chart-container"><br><br><div id="activity-summary" style="font-size:18px; line-height:1.6;"></div></div>
        <hr>
        <div class="chart-container"><div id="workoutChart"></div></div>
        <hr>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"
        integrity="sha256-WBkoXOwTeyKclOHuWtc+i2uENFpDZ9YPdf5Hf+D7ewM=" crossorigin=""></script>
    <script src="https://cdn.plot.ly/plotly-2.17.1.min.js"></script>
    <script src="js/strava_shared.js"></script>
    <script src="js/strava_animated.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const requestedUser = String(params.get('user') || window.STRAVA_PAGE_USER || 'connor').toLowerCase();
        const userConfig = StravaApp.USER_CONFIGS[requestedUser];
        const body = document.getElementById('body');
        const mapDiv = document.getElementById('map');
        const analyticsDiv = document.getElementById('analytics');
        const headerTitle = document.getElementById('header-title');
        const filterPanel = document.getElementById('filter-panel');
        const navLinks = document.getElementById('nav-links');
        const toggleButton = document.getElementById('toggle-btn');
        const filterToggle = document.getElementById('filter-toggle');
        const filterToggleLabel = document.getElementById('filter-toggle-label');
        const filterToggleCount = document.getElementById('filter-toggle-count');
        const filterBody = document.getElementById('filter-body');
        const dateFromInput = document.getElementById('date-from');
        const dateToInput = document.getElementById('date-to');
        const typePills = document.getElementById('type-pills');
        const activityCountLabel = document.getElementById('activity-count-label');
        const splashText = document.getElementById('splash-text');
        const state = {
            map: null,
            analyticsVisible: false,
            filtersCollapsed: false,
            allActivities: [],
            allDescriptors: [],
            renderedKeys: new Set(),
            filters: { types: new Set(), dateFrom: '', dateTo: '', users: new Set([requestedUser]) }
        };

        StravaApp.setupSplashScreen();

        if (!userConfig) {
            headerTitle.textContent = 'Unknown User';
            splashText.textContent = 'Unknown user';
            throw new Error(`Unknown user: ${requestedUser}`);
        }

        document.title = `${userConfig.displayName} Strava`;
        headerTitle.textContent = userConfig.title;
        window.setTimeout(function () {
            headerTitle.classList.add('faded');
        }, 5000);

        function setOverlayVisibility(isMapVisible) {
            const titleVisible = isMapVisible && window.innerWidth > 600;
            headerTitle.style.display = titleVisible ? 'block' : 'none';
            filterPanel.style.display = isMapVisible ? 'block' : 'none';
            navLinks.style.display = isMapVisible && window.innerWidth > 600 ? 'flex' : 'none';
        }

        function getFilteredActivities() {
            return StravaApp.filterActivities(state.allActivities, state.filters, requestedUser);
        }

        function drawAnalytics() {
            const accumulator = StravaApp.createDataAccumulator();
            getFilteredActivities().forEach(accumulator.add);
            StravaApp.drawSummaryChart('activity-summary', accumulator.activityCounts);
            StravaApp.drawMilesChart('workoutChart', accumulator.workoutData, 1);
        }

        function refreshFilterSummary() {
            const filteredActivities = getFilteredActivities();
            filterToggleCount.textContent = filteredActivities.length;
            filterToggleLabel.textContent = `${state.filtersCollapsed ? '►' : '▼'} Filters`;
            activityCountLabel.textContent = `Showing ${filteredActivities.length} activities`;
            if (state.map) {
                StravaApp.applyFilters(state.map, state.filters);
            }
            if (state.analyticsVisible) {
                drawAnalytics();
            }
        }

        function renderTypePills(types) {
            typePills.innerHTML = '';
            types.forEach(function (type) {
                const pill = document.createElement('button');
                pill.type = 'button';
                pill.className = 'type-pill active';
                pill.dataset.type = type;
                pill.textContent = StravaApp.getActivityLabel(type);
                pill.addEventListener('click', function () {
                    if (state.filters.types.has(type)) {
                        state.filters.types.delete(type);
                    } else {
                        state.filters.types.add(type);
                    }
                    pill.classList.toggle('active', state.filters.types.has(type));
                    pill.classList.toggle('inactive', !state.filters.types.has(type));
                    refreshFilterSummary();
                });
                typePills.appendChild(pill);
            });
        }

        function initializeFilters(activities) {
            const dates = activities.map(function (activity) {
                return String(activity.start_date || '').split('T')[0];
            }).filter(Boolean).sort();
            const types = StravaApp.getDetectedTypes(activities);
            state.filters.types = new Set(types);
            state.filters.dateFrom = dates[0] || '';
            state.filters.dateTo = dates[dates.length - 1] || '';
            dateFromInput.value = state.filters.dateFrom;
            dateToInput.value = state.filters.dateTo;
            renderTypePills(types);
            refreshFilterSummary();
        }

        filterToggle.addEventListener('click', function () {
            state.filtersCollapsed = !state.filtersCollapsed;
            filterBody.style.display = state.filtersCollapsed ? 'none' : 'grid';
            refreshFilterSummary();
        });

        dateFromInput.addEventListener('change', function () {
            state.filters.dateFrom = dateFromInput.value;
            refreshFilterSummary();
        });

        dateToInput.addEventListener('change', function () {
            state.filters.dateTo = dateToInput.value;
            refreshFilterSummary();
        });

        toggleButton.addEventListener('click', function () {
            state.analyticsVisible = !state.analyticsVisible;
            if (state.analyticsVisible) {
                mapDiv.style.display = 'none';
                analyticsDiv.style.display = 'block';
                body.style.background = '#ffffff';
                toggleButton.textContent = 'Show Map';
                setOverlayVisibility(false);
                drawAnalytics();
                return;
            }
            mapDiv.style.display = 'block';
            analyticsDiv.style.display = 'none';
            body.style.background = '#000000';
            toggleButton.textContent = 'Show Analytics';
            setOverlayVisibility(true);
            if (state.map) {
                state.map.invalidateSize();
            }
        });

        async function loadUserPage() {
            const fallbackCenter = [userConfig.lat, userConfig.lng];
            state.map = StravaApp.initMap('map', fallbackCenter, 8);
            setOverlayVisibility(true);

            let activities = [];
            let latestCenter = fallbackCenter;

            if (window.STRAVA_CONFIG.apiBase) {
                await StravaApp.apiPost(window.STRAVA_CONFIG.apiBase, `/api/sync/${userConfig.slug}`, {});
                activities = await StravaApp.apiGet(window.STRAVA_CONFIG.apiBase, '/api/activities', { user: userConfig.slug });
                activities = StravaApp.sortActivitiesNewestFirst(activities.map(StravaApp.normalizeActivityRecord));
                if (activities[0] && Array.isArray(activities[0].start_latlng) && activities[0].start_latlng.length === 2) {
                    latestCenter = activities[0].start_latlng;
                }
            } else {
                const auth = await StravaApp.stravaReAuthorize(userConfig);
                latestCenter = await StravaApp.stravaGetLatestLocation(auth.access_token, fallbackCenter);
                activities = await StravaApp.stravaFetchActivities(auth.access_token, userConfig.pages);
            }

            state.map.setView(latestCenter, 8);
            state.allActivities = activities;
            initializeFilters(activities);

            const lineStyle = StravaApp.getLineStyle();
            state.allDescriptors = activities.map(function (activity) {
                return StravaApp.createActivityDescriptor(activity, {
                    userSlug: userConfig.slug,
                    lineWeight: lineStyle.LINE_WEIGHT,
                    opacityWeight: lineStyle.OPACITY_WEIGHT
                });
            }).filter(Boolean);

            const animatedSelection = StravaAnimated.selectRecentDescriptors(state.allDescriptors, StravaAnimated.ANIMATE_COUNT);
            const flyCenter = animatedSelection.center ? [animatedSelection.center.lat, animatedSelection.center.lng] : latestCenter;
            await StravaApp.flyIn(state.map, flyCenter);

            if (animatedSelection.animated.length) {
                const animatedLayers = await StravaAnimated.animateRecentDescriptors(state.map, animatedSelection.animated);
                animatedLayers.forEach(function (layer) {
                    state.renderedKeys.add(layer._stravaMeta.activityKey);
                });
                refreshFilterSummary();
                await StravaAnimated.wait(StravaAnimated.POST_ANIMATION_DELAY_MS);
            }

            const remainingDescriptors = state.allDescriptors.filter(function (descriptor) {
                return !state.renderedKeys.has(descriptor.meta.activityKey);
            });
            StravaApp.renderActivityDescriptors(state.map, remainingDescriptors).forEach(function (layer) {
                state.renderedKeys.add(layer._stravaMeta.activityKey);
            });
            refreshFilterSummary();
        }

        loadUserPage().catch(function (error) {
            console.error(error);
            splashText.textContent = 'Unable to load Strava data';
        });
    </script>
</body>

</html>
